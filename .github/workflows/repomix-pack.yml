name: Repomix Pack Repo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pack-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Repomix pack-repo
        run: npx repomix pack-repo --config repomix.config.json

      - name: Commit & Push repomix output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add repo-context.xml
          git commit -m "Update repomix output [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload repomix output as artifact
        uses: actions/upload-artifact@v3
        with:
          name: repomix-output
          path: repo-context.xml
