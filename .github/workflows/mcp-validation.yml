name: Validate MCP Configuration
on: [pull_request]

permissions:
  contents: read

concurrency:
  group: mcp-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          jq empty .github/copilot/mcp-servers.json
      - name: Validate YAML
        run: |
          ruby -ryaml -e "YAML.load_file('.github/copilot/mcp-tools.yaml')"
          ruby -ryaml -e "YAML.load_file('.github/copilot/tasks.yaml')"
