name: Copilot Agent Project Tree

on:
  workflow_dispatch:
  push:

jobs:
  agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Project Tree Agent
        run: node dynamic/copilot-swe-agent/agent.js
        env:
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
