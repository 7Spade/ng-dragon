name: Playwright Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn dlx playwright install --with-deps
      - run: yarn e2e
